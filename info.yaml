# Tiny Tapeout project information
project:
  title:        "elevator_controller"
  author:       "subiksha"
  discord:      ""  
  description:  "FSM-based 3-floor elevator controller with floor tracking, movement direction, and door control"
  language:     "Verilog"
  clock_hz:     10000000

  # Tile size
  tiles: "1x1"

  # Top module (ensure this matches your Verilog file)
  top_module:  "tt_um_example"

  # Source files (must exist in ./src)
  source_files:
    - "project.v"

# Pinout (used for documentation)
pinout:
  # Inputs
  ui[0]: "request_floor[0]"
  ui[1]: "request_floor[1]"
  ui[2]: "request_valid"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "current_floor[0]"
  uo[1]: "current_floor[1]"
  uo[2]: "moving_up"
  uo[3]: "moving_down"
  uo[4]: "door_open"
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
